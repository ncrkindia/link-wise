[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:mariadb]
command=/usr/bin/mysqld_safe
autostart=true
autorestart=true
stderr_logfile=/dev/stderr
stdout_logfile=/dev/stdout
stderr_logfile_maxbytes=0
stdout_logfile_maxbytes=0

[program:keycloak]
command=/opt/keycloak/bin/kc-wrapper.sh --import-realm --optimized --http-port=8080 --proxy=edge
autostart=true
autorestart=true
stderr_logfile=/dev/stderr
stdout_logfile=/dev/stdout
stderr_logfile_maxbytes=0
stdout_logfile_maxbytes=0
environment=KC_DB=mysql,KC_DB_URL=jdbc:mysql://localhost:3306/keycloak,KC_DB_USERNAME=keycloak_user,KC_DB_PASSWORD=keycloak_pass,KC_HOSTNAME_STRICT=false,KEYCLOAK_ADMIN=admin,KEYCLOAK_ADMIN_PASSWORD=admin

[program:nextjs]
command=npm start
directory=/app
autostart=true
autorestart=true
stderr_logfile=/dev/stderr
stdout_logfile=/dev/stdout
stderr_logfile_maxbytes=0
stdout_logfile_maxbytes=0
environment=NODE_ENV=production,PORT=3010
