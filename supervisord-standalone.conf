[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:mariadb]
command=/usr/bin/mysqld_safe
autostart=true
autorestart=true
stderr_logfile=/var/log/mariadb.err.log
stdout_logfile=/var/log/mariadb.out.log

[program:keycloak]
command=/opt/keycloak/bin/kc.sh start --import-realm --optimized --http-port=8080 --proxy=edge
autostart=true
autorestart=true
stderr_logfile=/var/log/keycloak.err.log
stdout_logfile=/var/log/keycloak.out.log
environment=KC_DB=mariadb,KC_DB_URL=jdbc:mariadb://localhost:3306/keycloak,KC_DB_USERNAME=keycloak_user,KC_DB_PASSWORD=keycloak_pass,KC_HOSTNAME_STRICT=false,KEYCLOAK_ADMIN=admin,KEYCLOAK_ADMIN_PASSWORD=admin

[program:nextjs]
command=npm start
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/nextjs.err.log
stdout_logfile=/var/log/nextjs.out.log
environment=NODE_ENV=production,PORT=3010
