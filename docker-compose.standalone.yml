version: '3.8'

# Link-Wise 'All-In-One' Standalone Bundle
# Created by Naveen Chauhan (github.com/ncrkindia)

services:
  link-wise-full:
    build:
      context: .
      dockerfile: Dockerfile.standalone
    container_name: link-wise-standalone
    ports:
      - "3010:3010" # Next.js App
      - "8080:8080" # Keycloak IDP
      - "3306:3306" # MariaDB (optional expose)
    environment:
      # Use these to scale to a domain (e.g., https://yourdomain.com)
      - KC_HOSTNAME=${PLATFORM_DOMAIN:-localhost}
      - NEXT_PUBLIC_APP_URL=http://${PLATFORM_DOMAIN:-localhost}:3010
    volumes:
      - linkwise_standalone_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  linkwise_standalone_data:
