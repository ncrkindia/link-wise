version: '3.8'

services:
  link-wise:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: link-wise-app
    ports:
      # Exposes the application externally on port 9358 while routing inside to Next.js 3000
      - "9358:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-mysql://linkwise_user:linkwise_pass@db:3306/linkwise}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_KEYCLOAK_ID=${AUTH_KEYCLOAK_ID}
      - AUTH_KEYCLOAK_SECRET=${AUTH_KEYCLOAK_SECRET}
      - AUTH_KEYCLOAK_ISSUER=${AUTH_KEYCLOAK_ISSUER}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:9358}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: link-wise-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: linkwise
      MYSQL_USER: linkwise_user
      MYSQL_PASSWORD: linkwise_pass
    volumes:
      - mysql_data:/var/lib/mysql
      # Automatically initializes the schema on the first run of the database
      - ./src/lib/mysql-schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    restart: unless-stopped

volumes:
  mysql_data:
